<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0e1621" />
  <meta name="format-detection" content="telephone=no, date=no, address=no, email=no, url=no" />
  <title>Claude — KukuiBot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e1621; --surface: #17212b;
      --bubble-user: #2b5278; --bubble-agent: #182533;
      --accent: #6c71c4; --text: #c4c4c4; --muted: #708499;
      --green: #4ade80; --yellow: #facc15; --red: #f87171;
      --purple: #6c71c4;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
      --mono: "SF Mono", "Fira Code", "Cascadia Code", monospace;
    }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg); color: var(--text); font-family: var(--font);
      font-size: 15px; line-height: 1.5; -webkit-font-smoothing: antialiased;
    }
    #app { display: flex; flex-direction: column; height: 100%; }

    /* Header */
    .header {
      flex-shrink: 0; background: rgba(23,33,43,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding: 6px 12px; display: flex; align-items: center; justify-content: space-between; z-index: 100; gap: 4px;
    }
    .header-left { display: flex; align-items: center; gap: 8px; }
    .header-label { font-size: 14px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 6px; }
    .header-sub { font-size: 11px; color: var(--muted); }
    .header-right { display: flex; align-items: center; gap: 4px; }
    .header-meta { font-size: 11px; color: var(--muted); }
    .back-link {
      font-size: 12px; color: var(--muted); text-decoration: none;
      display: flex; align-items: center; gap: 4px; transition: color 0.15s;
    }
    .back-link:hover { color: var(--text); }
    @media (max-width: 480px) {
      .header { padding: 4px 8px; }
      .header-right { gap: 2px; }
      .header-meta { display: none; }
      .settings-btn { width: 28px; height: 28px; }
    }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .status-dot.ok { background: var(--green); }
    .status-dot.down { background: var(--red); }
    .status-dot.working { background: var(--yellow); animation: pulse 1s infinite; }
    .settings-btn {
      width: 32px; height: 32px; border-radius: 50%; background: transparent;
      border: none; cursor: pointer; display: flex; align-items: center;
      justify-content: center; color: var(--muted); transition: background 0.15s;
    }
    .settings-btn:hover { background: rgba(255,255,255,0.05); }
    .footer-settings-btn {
      display: flex; width: 22px; height: 22px; border-radius: 50%; background: transparent;
      border: none; cursor: pointer; align-items: center; justify-content: center;
      color: var(--muted); transition: background 0.15s; position: relative; padding: 0;
    }
    .footer-settings-btn:hover { background: rgba(255,255,255,0.08); }
    #footer-dropdown { position: fixed; z-index: 9999; }

    /* Dropdown */
    .dropdown {
      position: absolute; right: 0; top: 40px; background: var(--surface);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5); overflow: hidden; min-width: 200px; z-index: 200;
    }
    .dropdown-item {
      display: flex; align-items: center; gap: 12px; padding: 12px 16px; font-size: 14px;
      background: none; border: none; cursor: pointer; color: var(--text); width: 100%;
      border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.1s;
    }
    .dropdown-item:last-child { border-bottom: none; }
    .dropdown-item:hover { background: rgba(255,255,255,0.05); }
    .dropdown-item.danger { color: var(--red); }

    /* Context bar */
    .context-bar { display: none; }
    .context-fill { height: 100%; transition: width 0.7s ease-out, background 0.5s; }

    /* Chat area */
    .chat-area {
      flex: 1; overflow-y: auto; overflow-x: hidden; padding: 8px 12px; overflow-anchor: auto;
    }
    .chat-area::-webkit-scrollbar { width: 6px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

    /* Empty state */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; text-align: center; padding: 32px; opacity: 0.6;
    }
    .empty-emoji { font-size: 48px; margin-bottom: 16px; }
    .empty-title { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .empty-sub { font-size: 13px; color: var(--muted); max-width: 320px; line-height: 1.6; }

    /* Message bubbles */
    .msg-row { display: flex; margin-bottom: 4px; }
    .msg-row.user { justify-content: flex-end; }
    .msg-row.assistant, .msg-row.system { justify-content: flex-start; }
    .msg-wrap { max-width: 85%; min-width: 0; display: flex; flex-direction: column; }
    .msg-row.assistant .msg-wrap, .msg-row.system .msg-wrap { max-width: 100%; }
    .msg-row.user .msg-wrap { align-items: flex-end; }
    .msg-row.assistant .msg-wrap, .msg-row.system .msg-wrap { align-items: flex-start; }
    .msg-label { font-size: 11px; color: var(--muted); margin-bottom: 2px; padding: 0 12px; }
    .msg-bubble {
      padding: 8px 14px; border-radius: 16px; font-size: 15px; line-height: 1.5;
      word-wrap: break-word; overflow-wrap: break-word;
    }
    .msg-row.user .msg-bubble { background: var(--bubble-user); border-bottom-right-radius: 6px; white-space: pre-wrap; }
    .msg-row.assistant .msg-bubble { background: var(--bubble-agent); border-bottom-left-radius: 6px; }
    .msg-row.system .msg-bubble {
      background: rgba(108,113,196,0.1); border: 1px solid rgba(108,113,196,0.2);
      border-bottom-left-radius: 6px; color: var(--purple); font-size: 13px;
    }
    .msg-row.steer { justify-content: flex-end; }
    .msg-row.steer .msg-wrap { align-items: flex-end; }
    .msg-row.steer .msg-bubble {
      background: var(--bubble-user); border-bottom-right-radius: 6px; white-space: pre-wrap;
      border-left: 3px solid #f59e0b; opacity: 0.85; padding-left: 12px;
    }
    .msg-row.steer .msg-label::after {
      content: ' · Steering'; color: #f59e0b; font-weight: 600;
    }
    .msg-time { font-size: 10px; color: var(--muted); margin-top: 4px; display: flex; align-items: center; gap: 5px; }
    .unread-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

    /* Copy button */
    .msg-bubble pre { position: relative; }
    .copy-btn {
      position: absolute; top: 6px; right: 6px;
      padding: 1px 6px; font-size: 10px; border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.07);
      color: var(--muted); cursor: pointer; opacity: 0; transition: opacity 0.15s;
      line-height: 1.6; user-select: none; white-space: nowrap;
    }
    .msg-bubble pre:hover .copy-btn { opacity: 1; }
    .copy-btn.copied { color: var(--green); border-color: rgba(74,222,128,0.3); }

    /* Markdown */
    .msg-bubble p { margin: 0 0 10px; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble p:first-child { margin-top: 0; }
    .msg-bubble code {
      background: rgba(255,255,255,0.1); color: var(--accent);
      padding: 1px 6px; border-radius: 4px; font-family: var(--mono); font-size: 13px;
    }
    .msg-bubble pre {
      background: rgba(0,0,0,0.3); color: #4ade80; padding: 12px; border-radius: 8px;
      font-family: var(--mono); font-size: 13px; overflow-x: auto; margin: 10px 0; white-space: pre-wrap;
    }
    .msg-bubble pre:last-child { margin-bottom: 0; }
    .msg-bubble pre code { background: none; color: inherit; padding: 0; }
    .msg-bubble strong { font-weight: 600; color: var(--text); }
    .msg-bubble em { font-style: italic; color: #d1d5db; }
    .msg-bubble a { color: var(--accent); text-decoration: underline; cursor: pointer; pointer-events: auto; }
    .msg-row.user .msg-bubble a { color: #818cf8; }
    .msg-bubble ul, .msg-bubble ol { padding-left: 20px; margin: 6px 0 10px; }
    .msg-bubble ul:last-child, .msg-bubble ol:last-child { margin-bottom: 0; }
    .msg-bubble li { margin: 4px 0; line-height: 1.5; }
    .msg-bubble li > p { margin: 0; }
    .msg-bubble h1, .msg-bubble h2, .msg-bubble h3 { font-weight: 700; margin: 14px 0 6px; line-height: 1.3; }
    .msg-bubble h1:first-child, .msg-bubble h2:first-child, .msg-bubble h3:first-child { margin-top: 0; }
    .msg-bubble h1 { font-size: 17px; } .msg-bubble h2 { font-size: 15px; } .msg-bubble h3 { font-size: 14px; }
    .msg-bubble h4 { font-size: 13px; font-weight: 600; margin: 10px 0 4px; color: var(--muted); }
    .msg-bubble hr { border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 12px 0; }
    .msg-bubble blockquote {
      border-left: 2px solid rgba(108,113,196,0.5); padding-left: 12px;
      margin: 10px 0; color: var(--muted); font-style: italic;
    }
    .msg-bubble table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 13px; }
    .msg-bubble th, .msg-bubble td { border: 1px solid rgba(255,255,255,0.1); padding: 6px 10px; text-align: left; }
    .msg-bubble th { background: rgba(255,255,255,0.05); font-weight: 600; }
    .msg-bubble img { max-width: 100%; border-radius: 8px; margin: 8px 0; }

    /* Thinking block */
    .thinking-block {
      margin: 4px 4px 8px; background: rgba(108,113,196,0.08);
      border: 1px solid rgba(108,113,196,0.15); border-radius: 12px; overflow: hidden;
    }
    .thinking-toggle {
      width: 100%; padding: 8px 12px; font-size: 12px; color: var(--purple);
      cursor: pointer; background: none; border: none; text-align: left;
      display: flex; align-items: center; gap: 6px;
    }
    .thinking-toggle:hover { background: rgba(108,113,196,0.05); }
    .thinking-content {
      padding: 0 12px 10px; font-size: 12px; color: var(--muted);
      font-family: var(--mono); line-height: 1.5; white-space: pre-wrap; max-height: 300px; overflow-y: auto;
    }

    /* Work log */
    #work-log-host { flex-shrink: 0; }
    .work-log {
      border-top: 1px solid rgba(255,255,255,0.07);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      background: rgba(16,22,33,0.7);
    }
    .work-log-toggle {
      width: 100%; background: none; border: 0; color: var(--muted);
      padding: 4px 10px; display: flex; align-items: center;
      gap: 6px; cursor: pointer; text-align: left;
    }
    .work-log-toggle:hover { background: rgba(255,255,255,.03); color: var(--text); }
    .work-head-arrow { font-size: 8px; flex-shrink: 0; width: 10px; text-align: center; }
    .work-head-left { font-size: 10px; min-width: 0; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .work-log-list {
      list-style: none; margin: 0; padding: 0 8px 4px;
      max-height: 120px; overflow-y: auto;
    }
    .work-log-list li {
      display: grid; grid-template-columns: 8px 1fr auto; gap: 5px;
      align-items: start; font-size: 10px; color: var(--muted);
      padding: 2px 2px; border-top: 1px dashed rgba(255,255,255,0.05);
    }
    .work-log-list li .dot { color: rgba(108,113,196,.9); font-size: 8px; }
    .work-log-list li .time { color: rgba(149,162,184,.85); font-size: 9px; white-space: nowrap; }

    /* Status banner */
    .status-banner {
      margin: 4px 12px 8px; padding: 8px 12px; border-radius: 8px;
      border: 1px solid rgba(108,113,196,0.3); background: rgba(108,113,196,0.12);
      color: #c4b5fd; font-size: 12px;
    }

    /* Input area */
    .input-area { flex-shrink: 0; border-top: 1px solid rgba(23,33,43,0.8); background: var(--bg); padding: 8px 12px; }
    .input-row { display: flex; align-items: center; gap: 8px; }
    .input-row textarea {
      flex: 1; background: var(--surface); color: var(--text); border: none; outline: none;
      border-radius: 16px; padding: 10px 16px; font-family: var(--font);
      font-size: 16px; line-height: 1.47; resize: none; min-height: 67px; max-height: 176px;
    }
    .input-row textarea::placeholder { color: var(--muted); }
    .input-row textarea:focus { box-shadow: 0 0 0 1px rgba(108,113,196,0.5); }
    .send-col { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 4px; }
    .send-btn {
      width: 44px; height: 44px; border-radius: 50%; background: var(--purple);
      border: none; cursor: pointer; display: flex; align-items: center;
      justify-content: center; transition: transform 0.1s, background 0.2s; flex-shrink: 0;
    }
    .send-btn:active { transform: scale(0.9); }
    .send-btn.loading { background: var(--muted); }
    .send-btn.listening { background: var(--red); animation: pulse 1s infinite; }
    .send-btn svg { width: 20px; height: 20px; fill: white; }

    /* Root badge */
    .root-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 7px; font-size: 10px; font-weight: 700; border-radius: 4px;
      background: rgba(248,113,113,0.15); border: 1px solid rgba(248,113,113,0.4);
      color: var(--red); cursor: pointer; letter-spacing: 0.05em;
      transition: background 0.15s;
    }
    .root-badge:hover { background: rgba(248,113,113,0.25); }

    /* Root modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px); z-index: 500;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-box {
      background: var(--surface); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px; padding: 24px; width: 320px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.6);
    }
    .modal-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
    .modal-sub { font-size: 12px; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }
    .modal-input {
      width: 100%; background: var(--bg); color: var(--text); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 10px 12px; font-size: 15px; outline: none; margin-bottom: 14px;
    }
    .modal-input:focus { border-color: rgba(248,113,113,0.5); }
    .modal-btns { display: flex; gap: 8px; }
    .modal-btn {
      flex: 1; padding: 9px; border-radius: 8px; border: none; cursor: pointer;
      font-size: 13px; font-weight: 600; transition: opacity 0.15s;
    }
    .modal-btn:hover { opacity: 0.85; }
    .modal-btn.primary { background: var(--red); color: white; }
    .modal-btn.secondary { background: rgba(255,255,255,0.08); color: var(--muted); }
    .modal-error { font-size: 12px; color: var(--red); margin-bottom: 10px; min-height: 16px; }

    .hidden { display: none !important; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    .pulse { animation: pulse 1.5s infinite; }

    /* Solarized Dark theme */
    .sol-dark {
      --bg: #000000; --surface: #0a0a0a;
      --bubble-user: #073642; --bubble-agent: #00212b;
      --accent: #268bd2; --text: #839496; --muted: #586e75;
      --green: #859900; --yellow: #b58900; --red: #dc322f;
      --purple: #6c71c4;
    }
    .sol-dark .header { background: rgba(10,10,10,0.92); }
    .sol-dark .msg-bubble pre { background: rgba(10,10,10,0.8); color: #859900; }
    .sol-dark .msg-bubble code { background: rgba(88,110,117,0.25); color: var(--accent); }
    .sol-dark .msg-bubble strong { color: #93a1a1; }
    .sol-dark .msg-bubble em { color: #657b83; }
    .sol-dark .msg-row.user .msg-bubble { border: 1px solid rgba(38,139,210,0.2); }
    .sol-dark .msg-row.assistant .msg-bubble { border: 1px solid rgba(88,110,117,0.15); }
    .sol-dark .msg-row.system .msg-bubble {
      background: rgba(108,113,196,0.1); border: 1px solid rgba(108,113,196,0.2); color: var(--purple);
    }
    .sol-dark .input-area { background: var(--bg); }
    .sol-dark .footer-bar { background: rgba(10,10,10,0.5); }
    .sol-dark .context-bar { background: rgba(10,10,10,0.5); }
    .sol-dark .work-log { background: rgba(0,0,0,0.7); }
    .sol-dark .dropdown { background: var(--surface); border-color: rgba(88,110,117,0.2); }
    .sol-dark .input-row textarea:focus { box-shadow: 0 0 0 1px rgba(38,139,210,0.5); }
    .sol-dark .chat-area::-webkit-scrollbar-thumb { background: rgba(88,110,117,0.3); }
    .sol-dark .msg-bubble th { background: rgba(88,110,117,0.15); }
    .sol-dark .msg-bubble th, .sol-dark .msg-bubble td { border-color: rgba(88,110,117,0.2); }
    .sol-dark .msg-bubble hr { border-top-color: rgba(88,110,117,0.2); }
    .sol-dark .msg-bubble blockquote { border-left-color: rgba(38,139,210,0.5); }
    .sol-dark .copy-btn { border-color: rgba(88,110,117,0.3); background: rgba(88,110,117,0.15); }

    /* Solarized Light theme */
    .sol-light {
      --bg: #fdf6e3; --surface: #eee8d5;
      --bubble-user: #eee8d5; --bubble-agent: #fdf6e3;
      --accent: #268bd2; --text: #657b83; --muted: #93a1a1;
      --green: #859900; --yellow: #b58900; --red: #dc322f;
      --purple: #6c71c4;
    }
    .sol-light .header { background: rgba(238,232,213,0.92); border-bottom-color: rgba(0,0,0,0.08); }
    .sol-light .msg-bubble pre { background: rgba(238,232,213,0.8); color: #859900; }
    .sol-light .msg-bubble code { background: rgba(147,161,161,0.15); color: var(--accent); }
    .sol-light .msg-bubble strong { color: #586e75; }
    .sol-light .msg-bubble em { color: #93a1a1; }
    .sol-light .msg-row.user .msg-bubble { border: 1px solid rgba(38,139,210,0.2); }
    .sol-light .msg-row.assistant .msg-bubble { border: 1px solid rgba(147,161,161,0.2); }
    .sol-light .msg-row.system .msg-bubble {
      background: rgba(108,113,196,0.08); border: 1px solid rgba(108,113,196,0.15); color: var(--purple);
    }
    .sol-light .input-area { background: var(--bg); }
    .sol-light .input-row textarea { background: var(--surface); color: #586e75; }
    .sol-light .input-row textarea::placeholder { color: var(--muted); }
    .sol-light .footer-bar { background: rgba(238,232,213,0.5); border-top-color: rgba(0,0,0,0.08); }
    .sol-light .context-bar { background: rgba(238,232,213,0.5); }
    .sol-light .work-log { background: rgba(253,246,227,0.7); border-color: rgba(0,0,0,0.06); }
    .sol-light .work-log-toggle:hover { background: rgba(0,0,0,0.03); }
    .sol-light .dropdown { background: var(--surface); border-color: rgba(0,0,0,0.1); box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
    .sol-light .dropdown-item { color: var(--text); border-bottom-color: rgba(0,0,0,0.06); }
    .sol-light .dropdown-item:hover { background: rgba(0,0,0,0.04); }
    .sol-light .chat-area::-webkit-scrollbar-thumb { background: rgba(147,161,161,0.3); }
    .sol-light .settings-btn { color: var(--muted); }
    .sol-light .settings-btn:hover { background: rgba(0,0,0,0.05); }
    .sol-light .msg-bubble th { background: rgba(147,161,161,0.1); }
    .sol-light .msg-bubble th, .sol-light .msg-bubble td { border-color: rgba(147,161,161,0.2); }
    .sol-light .msg-bubble hr { border-top-color: rgba(147,161,161,0.2); }
    .sol-light .msg-bubble blockquote { border-left-color: rgba(38,139,210,0.5); }
    .sol-light .msg-bubble a { color: var(--accent); }
    .sol-light .msg-row.user .msg-bubble a { color: #268bd2; }
    .sol-light .copy-btn { border-color: rgba(147,161,161,0.3); background: rgba(147,161,161,0.1); color: #586e75; }
    .sol-light .thinking-block { background: rgba(108,113,196,0.06); border-color: rgba(108,113,196,0.12); }
    .sol-light .status-banner { border-color: rgba(108,113,196,0.2); background: rgba(108,113,196,0.08); color: #586e75; }
    .sol-light .modal-overlay { background: rgba(253,246,227,0.6); }
    .sol-light .modal-box { background: var(--surface); border-color: rgba(0,0,0,0.1); box-shadow: 0 16px 48px rgba(0,0,0,0.15); }
    .sol-light .modal-input { background: var(--bg); color: var(--text); border-color: rgba(0,0,0,0.1); }
    .sol-light .root-badge { background: rgba(220,50,47,0.1); border-color: rgba(220,50,47,0.3); }

    /* Blue theme (KukuiBot native) */
    .blue-theme {
      --accent: #5eb5f7; --purple: #5eb5f7;
    }
    .blue-theme .msg-row.system .msg-bubble {
      background: rgba(94,181,247,0.1); border-color: rgba(94,181,247,0.2); color: var(--accent);
    }
    .blue-theme .thinking-block { background: rgba(94,181,247,0.08); border-color: rgba(94,181,247,0.15); }
    .blue-theme .thinking-toggle { color: var(--accent); }
    .blue-theme .status-banner { border-color: rgba(94,181,247,0.3); background: rgba(94,181,247,0.12); color: #93d5ff; }

    .blue-theme .msg-bubble blockquote { border-left-color: rgba(94,181,247,0.5); }

    .blue-theme .msg-row.user .msg-bubble a { color: #7cc5ff; }
    .blue-theme .work-log-list li .dot { color: rgba(94,181,247,.9); }
  </style>
</head>
<body>

        </a>

          <svg id="mic-icon" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>

      <button class="dropdown-item" onclick="viewContext()">📋 View Context</button>
      <button class="dropdown-item" id="footer-theme-btn" onclick="cycleTheme()">🎨 Theme: Default</button>

      <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-title">🔐 Enable Root Access (30 min)</div>
        <div class="modal-sub">Sudo credentials are validated and cached for 30 minutes.<br>Password is never stored — discarded after authentication.</div>
        <input class="modal-input" id="root-pwd-input" type="password" placeholder="sudo password"
               onkeydown="if(event.key==='Enter')activateRoot(); if(event.key==='Escape')closeRootModal();" autocomplete="current-password" />
        <div class="modal-error" id="root-modal-error"></div>
        <div class="modal-btns">
          <button class="modal-btn secondary" onclick="closeRootModal()">Cancel</button>

        </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
  <script>
/* Claude Chat — KukuiBot standalone Claude Code Bridge UI */

const API = '/claude/api';
const STORAGE_KEY = 'kukuibot_claude_messages';
const CLAUDE_ICON = '<svg style="width:14px;height:14px;vertical-align:-2px" viewBox="0 0 24 24"><path d="M12 2l2.4 7.2H22l-6 4.8 2.4 7.2L12 16l-6.4 5.2 2.4-7.2-6-4.8h7.6z" fill="currentColor"/></svg>';

// Theme
const THEMES = ['default', 'blue', 'sol-dark', 'sol-light'];
const THEME_LABELS = { 'default': 'Default', 'blue': 'Blue', 'sol-dark': 'Solarized Dark', 'sol-light': 'Solarized Light' };
const THEME_KEY = 'kukuibot_claude_theme';
function applyTheme(theme) {
  document.body.classList.remove('blue-theme', 'sol-dark', 'sol-light');
  if (theme === 'blue') document.body.classList.add('blue-theme');
  else if (theme !== 'default') document.body.classList.add(theme);
  const metaTheme = document.querySelector('meta[name="theme-color"]');
  if (metaTheme) {
    metaTheme.content = theme === 'sol-dark' ? '#000000' : theme === 'sol-light' ? '#fdf6e3' : '#0e1621';
  }
  const btn = document.getElementById('theme-toggle-btn');
  if (btn) btn.textContent = '🎨 Theme: ' + THEME_LABELS[theme];
  const fbtn = document.getElementById('footer-theme-btn');
  if (fbtn) fbtn.textContent = '🎨 Theme: ' + THEME_LABELS[theme];
  localStorage.setItem(THEME_KEY, theme);
}
function cycleTheme() {
  const current = localStorage.getItem(THEME_KEY) || 'default';
  const idx = THEMES.indexOf(current);
  applyTheme(THEMES[(idx + 1) % THEMES.length]);
}
applyTheme(localStorage.getItem(THEME_KEY) || 'default');

let CONTEXT_WINDOW = 1000000;
const CHARS_PER_TOKEN = 4;

// State
let messages = [];
let loading = false;
let _shiftHeld = false;
document.addEventListener('keydown', e => { if (e.key === 'Shift') _shiftHeld = true; });
document.addEventListener('keyup', e => { if (e.key === 'Shift') _shiftHeld = false; });
let streamingText = '';
let workLog = [];
let toolCallCount = 0;
let showWorkLog = false;
let thinkingText = '';
let thinkingExpanded = false;
let statusBanner = null;
let bridgeStatus = null;
let tps = null, _tpsStart = 0, _tpsChars = 0;
let perfStart = null;
let abortController = null;
let systemPromptTokens = 10720;
let lastSeenIdx = -1;
let _activeResolve = null;
let _workerName = 'Claude';

function estimateTokens() {
  const msgChars = messages.reduce((sum, m) => sum + (m.text || '').length, 0);
  return systemPromptTokens + Math.round(msgChars / CHARS_PER_TOKEN);
}

// Helpers
const $ = id => document.getElementById(id);
const fmtTime = d => new Date(d).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
const fmtK = n => n == null ? '?' : n >= 1000000 ? (n/1000000).toFixed(1) + 'M' : Math.round(n/1000) + 'k';
const fmtM = n => n == null ? '' : (n / 1000000).toFixed(1) + 'M';
const ctxColor = pct => pct > 80 ? 'var(--red)' : pct > 65 ? 'var(--yellow)' : 'var(--green)';
const esc = s => { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; };
function linkify(escaped) {
  return escaped.replace(/(?<![=\w"'])(https?:\/\/[^\s<>"'&]+)/g, url =>
    `<a href="${url}" target="_blank" rel="noopener">${url}</a>`);
}

if (typeof marked !== 'undefined') {
  marked.setOptions({ breaks: true, gfm: true });
  marked.use({ renderer: {
    link({ href, title, text }) {
      const url = href || '';
      const t = title ? ` title="${esc(title)}"` : '';
      return `<a href="${url}"${t} target="_blank" rel="noopener">${text || url}</a>`;
    },
    code({ text, lang }) {
      const escaped = esc(text);
      const langAttr = lang ? ` class="language-${esc(lang)}"` : '';
      return `<pre><button class="copy-btn" onclick="copyPre(this)" title="Copy">⎘ copy</button><code${langAttr}>${escaped}</code></pre>\n`;
    }
  } });
}
function md(text) {
  if (typeof marked !== 'undefined') try { return marked.parse(text || ''); } catch {}
  return linkify(esc(text)).replace(/\n/g, '<br>');
}

// Persistence
function persist() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(messages)); } catch {} }

// Hydrate from server
let _chatlogTotal = 0;
let _chatlogLoaded = 0;
let _allLoaded = false;
let _loadingOlder = false;
const PAGE_SIZE = 10;

async function hydrateFromServer() {
  try {
    const res = await fetch(`${API}/chatlog?n=${PAGE_SIZE}&offset=0`, { credentials: 'same-origin' });
    if (!res.ok) throw new Error('server unavailable');
    const data = await res.json();
    const serverMsgs = (data.messages || []).filter(m => m.role && m.text);
    _chatlogTotal = data.total || 0;
    _chatlogLoaded = serverMsgs.length;
    _allLoaded = !data.has_more;
    if (serverMsgs.length > 0) {
      messages = serverMsgs;
      lastSeenIdx = messages.length - 1;
      persist();
    }
  } catch {
    try { const s = localStorage.getItem(STORAGE_KEY); if (s) messages = JSON.parse(s); } catch {}
    _chatlogLoaded = messages.length;
    _allLoaded = true;
  }
}

async function loadOlderMessages() {
  if (_allLoaded || _loadingOlder) return;
  _loadingOlder = true;
  const el = $('chat-area');
  try {
    const res = await fetch(`${API}/chatlog?n=${PAGE_SIZE}&offset=${_chatlogLoaded}`, { credentials: 'same-origin' });
    if (!res.ok) return;
    const data = await res.json();
    const older = (data.messages || []).filter(m => m.role && m.text);
    _allLoaded = !data.has_more;
    if (older.length === 0) { _allLoaded = true; return; }
    _chatlogLoaded += older.length;
    messages = [...older, ...messages];
    lastSeenIdx += older.length;
    let olderHtml = '';
    const streamLabel = _workerName + ' · Opus 4.6 ' + CLAUDE_ICON;
    for (const msg of older) {
      const cls = msg.role === 'user' ? 'user' : msg.role === 'system' ? 'system' : 'assistant';
      const label = msg.role === 'user' ? 'You' : msg.role === 'system' ? 'System' : streamLabel;
      const content = msg.role === 'user' ? linkify(esc(msg.text)) : md(msg.text);
      const timeStr = msg.duration ? `${fmtTime(msg.ts)} · ${(msg.duration/1000).toFixed(1)}s` : fmtTime(msg.ts);
      const tokenStr = msg.tokens ? ` · ${fmtM(msg.tokens)}` : '';
      olderHtml += `<div class="msg-row ${cls}"><div class="msg-wrap">` +
        `<div class="msg-label">${label}</div>` +
        `<div class="msg-bubble">${content}</div>` +
        `<div class="msg-time">${timeStr}${tokenStr}</div></div></div>`;
    }
    const firstMsg = el.querySelector('.msg-row');
    if (firstMsg) firstMsg.insertAdjacentHTML('beforebegin', olderHtml);
    else el.insertAdjacentHTML('afterbegin', olderHtml);
    const indicator = el.querySelector('[data-load-older]');
    if (indicator) {
      if (_allLoaded) indicator.remove();
      else indicator.innerHTML = `↑ Load older messages (${_chatlogTotal - _chatlogLoaded} remaining)`;
    }
    _renderMsgCount = messages.length;
    persist();
  } catch {}
  finally { _loadingOlder = false; }
}

// Scroll awareness
let _userScrolledUp = false;
let _renderMsgCount = -1;
let _scrollLockUntil = 0;
function _initScrollWatch() {
  const el = $('chat-area');
  if (!el || el._scrollWatchAttached) return;
  el.addEventListener('scroll', () => {
    if (Date.now() < _scrollLockUntil) return;
    const nearBottom = (el.scrollHeight - el.scrollTop - el.clientHeight) < 80;
    _userScrolledUp = !nearBottom;
    if (el.scrollTop < 50 && !_allLoaded && !_loadingOlder) loadOlderMessages();
  });
  el._scrollWatchAttached = true;
}

// Render
function render() {
  const el = $('chat-area');
  _initScrollWatch();

  if (_userScrolledUp) {
    renderWorkLogFixed();
    updateChrome();
    return;
  }

  const streamLabel = _workerName + ' · Opus 4.6 ' + CLAUDE_ICON;

  if (messages.length === 0 && !loading && !streamingText) {
    el.innerHTML = `<div class="empty-state">` +
      `<div class="empty-emoji">${CLAUDE_ICON.replace('14px', '48px').replace('14px', '48px')}</div>` +
      `<div class="empty-title">Claude</div>` +
      `<div class="empty-sub">Claude Opus 4.6 via KukuiBot<br>` +
      `Persistent process · Full tool access<br>Auto-compaction · Session resume<br>` +
      `<span style="color:var(--purple);font-size:12px">$0 cost · Claude Code CLI</span></div></div>`;
    return;
  }

  let html = '';
  if (!_allLoaded && _chatlogLoaded > 0) {
    const remaining = _chatlogTotal - _chatlogLoaded;
    html += `<div data-load-older style="text-align:center;padding:12px;color:var(--purple);font-size:13px;cursor:pointer;user-select:none" onclick="loadOlderMessages()">↑ Load older messages (${remaining} remaining)</div>`;
  }
  if (statusBanner) html += `<div class="status-banner">${esc(statusBanner)}</div>`;

  for (let i = 0; i < messages.length; i++) {
    const msg = messages[i];
    const cls = msg.role === 'steer' ? 'steer' : msg.role === 'user' ? 'user' : msg.role === 'system' ? 'system' : 'assistant';
    const label = msg.role === 'steer' ? 'You' : msg.role === 'user' ? 'You' : msg.role === 'system' ? 'System' : streamLabel;
    const content = (msg.role === 'user' || msg.role === 'steer') ? linkify(esc(msg.text)) : md(msg.text);
    const isUnread = msg.role === 'assistant' && i > lastSeenIdx;
    const dot = isUnread ? `<span class="unread-dot"></span>` : '';
    const timeStr = msg.duration ? `${fmtTime(msg.ts)} · ${(msg.duration/1000).toFixed(1)}s` : fmtTime(msg.ts);
    const tokenStr = msg.tokens ? ` · ${fmtM(msg.tokens)}` : '';
    html += `<div class="msg-row ${cls}"><div class="msg-wrap">` +
      `<div class="msg-label">${label}</div>` +
      `<div class="msg-bubble">${content}</div>` +
      `<div class="msg-time">${timeStr}${tokenStr}${dot}</div>` +
      `</div></div>`;
  }

  // Thinking block
  if (thinkingText && loading) {
    html += `<div class="thinking-block"><button class="thinking-toggle" onclick="thinkingExpanded=!thinkingExpanded;render()">` +
      `${thinkingExpanded ? '▼' : '▶'} Thinking…</button>` +
      (thinkingExpanded ? `<div class="thinking-content">${esc(thinkingText)}</div>` : '') + `</div>`;
  }

  // Streaming text
  if (streamingText) {
    html += `<div class="msg-row assistant"><div class="msg-wrap">` +
      `<div class="msg-label">${streamLabel}</div>` +
      `<div class="msg-bubble" id="streaming-bubble">${md(streamingText)}</div></div></div>`;
  }

  // Loading indicator
  if (loading && !streamingText && workLog.length === 0 && !thinkingText) {
    html += `<div class="msg-row assistant"><div class="msg-wrap">` +
      `<div class="msg-label">${streamLabel}</div>` +
      `<div class="msg-bubble"><span class="pulse" style="color:var(--purple)">Working…</span></div></div></div>`;
  }

  const existingBubble = el.querySelector('#streaming-bubble');
  if (existingBubble && streamingText && _renderMsgCount === messages.length) {
    existingBubble.innerHTML = md(streamingText);
  } else {
    _scrollLockUntil = Date.now() + 200;
    el.innerHTML = html;
    _renderMsgCount = messages.length;
  }
  el.scrollTop = el.scrollHeight;

  renderWorkLogFixed();
  updateChrome();
}

function updateChrome() {
  // Status dot
  const dot = $('status-dot');
  if (loading) dot.className = 'status-dot working';
  else if (bridgeStatus?.running) dot.className = 'status-dot ok';
  else dot.className = 'status-dot down';

  // Context bar
  const fill = $('context-fill');
  const tokens = (bridgeStatus?.last_input_tokens > 0) ? bridgeStatus.last_input_tokens : estimateTokens();
  const pct = Math.min(100, Math.round((tokens / CONTEXT_WINDOW) * 100));
  fill.style.width = pct + '%';
  fill.style.background = ctxColor(pct);

  // Perf timer
  $('perf-display').textContent = loading && perfStart
    ? ((Date.now() - perfStart) / 1000).toFixed(1) + 's' : '';

  // Action button state
  const btn = $('send-btn');
  btn.classList.toggle('loading', loading && !_sttListening);
  if (loading) btn.title = 'Steer (Shift+Enter to abort)';
  else updateActionBtn();
}

// Work log
let _wlExpanded = false;
function renderWorkLogFixed() {
  const host = $('work-log-host');
  if (!host) return;

  const displayList = workLog.slice(-100);
  const toolCalls = toolCallCount || workLog.filter(e => e.icon === '⚙️').length;
  const activeLabel = displayList.length > 0 ? displayList[displayList.length - 1].text : '';

  const leftText = (!showWorkLog && loading && workLog.length)
    ? `Working · ${toolCalls} tool${toolCalls === 1 ? '' : 's'}${activeLabel ? ' · ' + activeLabel : ''}`
    : `Work Log (${toolCalls} tool${toolCalls === 1 ? '' : 's'})`;

  const existingLeft = host.querySelector('.work-head-left');
  if (existingLeft && _wlExpanded === showWorkLog) {
    existingLeft.textContent = leftText;
    const ctxEl = host.querySelector('.work-head-ctx');
    if (ctxEl) {
      const tk = (bridgeStatus?.last_input_tokens > 0) ? bridgeStatus.last_input_tokens : estimateTokens();
      const p = Math.min(100, Math.round((tk / CONTEXT_WINDOW) * 100));
      const pre = bridgeStatus?.last_input_tokens > 0 ? '' : '~';
      ctxEl.innerHTML = `<span style="color:${ctxColor(p)}">${pre}${fmtK(tk)}/${fmtK(CONTEXT_WINDOW)}</span>`;
    }
    if (showWorkLog && workLog.length) {
      const ul = host.querySelector('.work-log-list');
      if (ul) {
        ul.innerHTML = displayList.map(e =>
          `<li><span class="dot">•</span><span>${esc(e.text)}</span><span class="time">${fmtTime(e.ts)}</span></li>`
        ).join('');
      }
    }
    return;
  }

  _wlExpanded = showWorkLog;
  let items = '';
  if (showWorkLog && workLog.length) {
    items = '<ul class="work-log-list">' + displayList.map(e =>
      `<li><span class="dot">•</span><span>${esc(e.text)}</span><span class="time">${fmtTime(e.ts)}</span></li>`
    ).join('') + '</ul>';
  }

  const rootActive = bridgeStatus?.root_active;
  const rootMins = rootActive ? Math.ceil((bridgeStatus.root_expires_in || 0) / 60) : 0;
  const rootBadge = rootActive ? `<span class="root-badge" onclick="revokeRoot()" title="Root active — click to revoke" style="margin-left:4px">🔐 ${rootMins}m</span>` : '';
  const tk = (bridgeStatus?.last_input_tokens > 0) ? bridgeStatus.last_input_tokens : estimateTokens();
  const p = Math.min(100, Math.round((tk / CONTEXT_WINDOW) * 100));
  const pre = bridgeStatus?.last_input_tokens > 0 ? '' : '~';
  const tpsHtml = tps ? ` <span style="color:var(--dim)">${tps} t/s</span>` : '';
  host.innerHTML = `<div class="work-log">` +
    `<div class="work-log-toggle" style="display:flex;align-items:center;gap:0">` +
    `<button class="footer-settings-btn" id="gear-btn" onclick="event.stopPropagation();toggleFooterDropdown(event)" title="Settings" style="flex-shrink:0;margin-right:4px">` +
    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="15" height="15">` +

// SSE event handler
function handleSseEvent(evt, fullText) {
  switch (evt.type) {
    case 'chunk':
      fullText.v += (evt.text || '');
      streamingText = fullText.v;
      if (!_tpsStart) _tpsStart = Date.now();
      _tpsChars += (evt.text || '').length;
      const el = (Date.now() - _tpsStart) / 1000;
      if (el > 0.5) tps = Math.round((_tpsChars / 4) / el);
      break;
    case 'thinking_start':
      workLog.push({ icon: '🧠', text: 'Thinking…', ts: Date.now() });
      break;
    case 'thinking':
      thinkingText += (evt.text || '');
      break;
    case 'thinking_summary':
      thinkingText += '\n---\nSummary: ' + (evt.text || '');
      break;
    case 'ping': {
      const toolName = evt.tool || 'working';
      const detail = evt.detail ? `: ${evt.detail}` : '';
      const elapsed = evt.elapsed ? ` (${evt.elapsed}s)` : '';
      const icon = toolName === 'working' ? '⏳' : '⚙️';
      if (icon === '⚙️') toolCallCount++;
      workLog.push({ icon, text: `${toolName}${detail}${elapsed}`, ts: Date.now() });
      if (workLog.length > 100) workLog = workLog.slice(-100);
      break;
    }
    case 'compaction': {
      statusBanner = `🗜 Smart compacting… (${fmtK(evt.tokens)} tokens)`;
      workLog.push({ icon: '🗜', text: `Smart compact triggered at ${fmtK(evt.tokens)} tokens`, ts: Date.now() });
      break;
    }
    case 'compaction_done': {
      const loadedDone = evt.loaded_files || [];
      const shortFiles = loadedDone.map(d => d.replace('~/.kukuibot/', '').replace('~/', '~/'));
      const fileList = loadedDone.length > 0 ? `\n\nContext loaded (${loadedDone.length} file(s)):\n` + shortFiles.map(d => `- \`${d}\``).join('\n') : '';
      statusBanner = `✅ Compacted — ${loadedDone.length} context files, ${fmtK(evt.summary_length)} chars`;
      workLog.push({ icon: '✅', text: `Compaction #${evt.compaction_count} done — ${loadedDone.length} files, ${fmtK(evt.summary_length)} chars`, ts: Date.now() });
      messages.push({ role: 'system', text: `✅ Smart compact #${evt.compaction_count} complete — summary ${fmtK(evt.summary_length)} chars${fileList}`, ts: Date.now() });
      persist();
      setTimeout(() => { statusBanner = null; render(); }, 5000);
      break;
    }
    case 'error':
      streamingText += `\n\n⚠️ ${evt.error || 'Unknown error'}`;
      workLog.push({ icon: '❌', text: `Error: ${evt.error || ''}`, ts: Date.now() });
      break;
    case 'done':
      if (evt.text && evt.text.length > (fullText.v || '').length) fullText.v = evt.text;
      if (evt.context_window > 0) CONTEXT_WINDOW = evt.context_window;
      workLog.push({ icon: '✅', text: `Done${evt.duration_ms ? ` (${(evt.duration_ms/1000).toFixed(1)}s)` : ''}`, ts: Date.now() });
      return { done: true, duration: evt.duration_ms, tokens: evt.tokens };
  }
  return null;
}

let _sttRecognition = null;
let _sttListening = false;

function updateActionBtn() {
  const input = $('msg-input');

function handleActionBtn() {
  const input = $('msg-input');
  if (input && input.value.trim().length > 0) {
    if (_sttListening) stopSTTSilent();
    sendMessage();
  } else if (_sttListening) {
    stopSTT();
  } else {
    startSTT();
  }
}

function startSTT() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) { alert('Speech recognition not supported in this browser.'); return; }
  if (_sttRecognition) { _sttRecognition.abort(); _sttRecognition = null; }

  const recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  const btn = $('send-btn');
  const input = $('msg-input');
  let finalTranscript = '';

  recognition.onstart = () => { _sttListening = true; btn.classList.add('listening'); updateActionBtn(); };
  recognition.onresult = (event) => {
    let interim = '';
    finalTranscript = '';
    for (let i = 0; i < event.results.length; i++) {
      if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript;
      else interim += event.results[i][0].transcript;
    }
    input.value = finalTranscript + interim;
    autoResize(input);
  };
  recognition.onerror = (event) => { if (event.error !== 'aborted') console.warn('STT error:', event.error); stopSTT(); };
  recognition.onend = () => {
    _sttListening = false; btn.classList.remove('listening'); _sttRecognition = null; updateActionBtn();
    if (input.value.trim().length > 0) sendMessage();
  };

  _sttRecognition = recognition;
  recognition.start();
}

function stopSTT() { if (_sttRecognition) _sttRecognition.stop(); }

function stopSTTSilent() {
  if (_sttRecognition) {
    _sttListening = false;
    $('send-btn').classList.remove('listening');
    _sttRecognition.onresult = null;
    _sttRecognition.onend = () => { _sttRecognition = null; };
    _sttRecognition.stop();
    updateActionBtn();
  }
}

// Send message
async function sendMessage() {
  const input = $('msg-input'), text = input.value.trim();
  if (!text) return;

  if (loading && abortController) {
    if (_shiftHeld) {
      // Shift+Enter = hard abort (existing behavior)
      const waitDone = _activeResolve
        ? new Promise(r => { const prev = _activeResolve; _activeResolve = () => { prev && prev(); r(); }; })
        : Promise.resolve();
      abortController.abort();
      await waitDone;
    } else {
      // Non-destructive steer — inject via PreToolUse hook
      input.value = ''; autoResize(input);
      messages.push({ role: 'steer', text, ts: Date.now() });
      persist(); render();
      try {
        await fetch(`${API}/steer`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text }),
        });
      } catch (e) { console.warn('Steer failed:', e); }
      return;
    }
  }

  // Slash commands
  if (text.startsWith('/')) {
    const cmd = text.split(/\s+/)[0].slice(1).toLowerCase();
    if (cmd === 'compact') { input.value = ''; autoResize(input); smartCompact(); return; }
    if (cmd === 'clear' || cmd === 'reset') { input.value = ''; autoResize(input); clearChat(); return; }
    if (cmd === 'restart') { input.value = ''; autoResize(input); restartProcess(); return; }
    if (cmd === 'status') { input.value = ''; autoResize(input); refreshStatus(); render(); return; }
    if (cmd === 'context') { input.value = ''; autoResize(input); viewContext(); return; }
    if (cmd === 'help') {
      input.value = ''; autoResize(input);
      messages.push({ role: 'system', text: '/compact · /clear · /restart · /status · /context · /help', ts: Date.now() });
      persist(); render(); return;
    }
  }

  input.value = ''; autoResize(input);
  lastSeenIdx = messages.length - 1;
  messages.push({ role: 'user', text, ts: Date.now() });
  loading = true; streamingText = ''; workLog = []; toolCallCount = 0; showWorkLog = false; thinkingText = '';
  tps = null; _tpsStart = 0; _tpsChars = 0; _userScrolledUp = false; _iAmSending = true;
  perfStart = Date.now(); statusBanner = null;

  let _resolve;
  new Promise(r => { _resolve = r; _activeResolve = r; });

  persist(); render();

  const fullText = { v: '' };
  let duration = null;
  let doneTokens = null;

  try {
    abortController = new AbortController();
    const res = await fetch(`${API}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({ message: text, stream: true, inject_context: true }),
      signal: abortController.signal,
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${res.status}`);
    }

    const reader = res.body.getReader(), dec = new TextDecoder();
    let buf = '';
    while (true) {
      const { done: rDone, value } = await reader.read();
      if (rDone) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split('\n'); buf = lines.pop() || '';
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const evt = JSON.parse(line.slice(6));
          const result = handleSseEvent(evt, fullText);
          if (result?.done) { duration = result.duration; doneTokens = result.tokens; }
          if (evt.type === 'ping') { renderWorkLogFixed(); updateChrome(); }
          else render();
        } catch {}
      }
    }
  } catch (e) {
    if (e.name !== 'AbortError') {
      fullText.v += `\n\n⚠️ Connection error: ${e.message}`;
      streamingText = fullText.v;
    }
  } finally {
    streamingText = '';
    if (fullText.v.trim()) {
      messages.push({ role: 'assistant', text: fullText.v, ts: Date.now(), duration, tokens: doneTokens });
    }
    loading = false; perfStart = null; abortController = null; _iAmSending = false;
    persist(); refreshStatus(); render();
    if (_activeResolve === _resolve) _activeResolve = null;
    if (_resolve) _resolve();
  }
}

  $('root-activate-btn').disabled = true;

// Bridge events SSE — multi-browser sync
let _iAmSending = false;
let _evtSource = null;
let _passiveFullText = '';
function connectBridgeEvents() {
  if (_evtSource) return;
  _evtSource = new EventSource(`${API}/events`);
  _evtSource.onmessage = e => {
    if (_iAmSending) return;
    try {
      const evt = JSON.parse(e.data);
      if (evt.type === 'user_message') {
        messages.push({ role: 'user', text: evt.text, ts: evt.ts || Date.now() });
        persist(); render();
      } else if (evt.type === 'chunk') {
        if (!loading) {
          loading = true; streamingText = ''; workLog = []; toolCallCount = 0;
          showWorkLog = false; thinkingText = ''; _passiveFullText = '';
          perfStart = Date.now();
        }
        _passiveFullText += (evt.text || '');
        streamingText = _passiveFullText;
        render();
      } else if (evt.type === 'ping') {
        if (!loading) {
          loading = true; streamingText = ''; workLog = []; toolCallCount = 0;
          showWorkLog = false; thinkingText = ''; _passiveFullText = '';
          perfStart = Date.now();
        }
        const toolName = evt.tool || 'working';
        const detail = evt.detail ? `: ${evt.detail}` : '';
        const icon = toolName === 'working' ? '⏳' : '⚙️';
        if (icon === '⚙️') toolCallCount++;
        workLog.push({ icon, text: `${toolName}${detail}`, ts: Date.now() });
        if (workLog.length > 100) workLog = workLog.slice(-100);
        renderWorkLogFixed();
        updateChrome();
      } else if (evt.type === 'thinking_start') {
        workLog.push({ icon: '🧠', text: 'Thinking…', ts: Date.now() });
      } else if (evt.type === 'thinking') {
        thinkingText += (evt.text || '');
      } else if (evt.type === 'done') {
        streamingText = '';
        const finalText = evt.text || _passiveFullText;
        if (finalText.trim()) {
          messages.push({ role: 'assistant', text: finalText, ts: Date.now(), tokens: evt.tokens });
        }
        loading = false; perfStart = null; _passiveFullText = '';
        persist(); refreshStatus(); render();
      } else if (evt.type === 'error') {
        if (loading) { streamingText += `\n\n⚠️ ${evt.error || 'Unknown error'}`; render(); }
      } else if (evt.type === 'compaction') {
        statusBanner = `🗜 Smart compacting… (${fmtK(evt.tokens)} tokens)`;
        render();
      } else if (evt.type === 'compaction_done') {
        const loadedDone = evt.loaded_files || [];
        const shortFiles = loadedDone.map(d => d.replace('~/.kukuibot/', '').replace('~/', '~/'));
        const fileList = loadedDone.length > 0 ? `\n\nContext loaded (${loadedDone.length} file(s)):\n` + shortFiles.map(d => `- \`${d}\``).join('\n') : '';
        messages.push({ role: 'system', text: `✅ Smart compact #${evt.compaction_count} complete — summary ${fmtK(evt.summary_length)} chars${fileList}`, ts: Date.now() });
        statusBanner = null;
        persist(); render();
      }
    } catch {}
  };
  _evtSource.onerror = () => {
    _evtSource.close(); _evtSource = null;
    setTimeout(connectBridgeEvents, 5000);
  };
}

// Init
document.title = 'Claude — KukuiBot';
(async function init() {
  await Promise.all([refreshStatus(), refreshSystemPrompt(), refreshWorkerIdentity(), hydrateFromServer()]);
  _userScrolledUp = false;
  _scrollLockUntil = Date.now() + 500;
  render();
  setTimeout(() => {
    const el = $('chat-area');
    if (el) { el.scrollTop = el.scrollHeight; }
    _scrollLockUntil = Date.now() + 200;
  }, 50);
  $('msg-input').focus();
  connectBridgeEvents();
  $('chat-area').addEventListener('click', markSeen);
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') { refreshStatus(); connectBridgeEvents(); }
  });
})();
  </script>
</body>
